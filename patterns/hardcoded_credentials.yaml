pattern: hardcoded_credentials
failure_class: security_leak
conditions:
  - access_key_id
  - secret_access_key
  - plain_text_password
  - committed_secrets
description: AWS Credentials or database passwords hardcoded in source files. Risk of leakage via git.
mitigations:
  - iam_roles
  - secrets_manager
  - parameter_store
  - git_secrets_scan

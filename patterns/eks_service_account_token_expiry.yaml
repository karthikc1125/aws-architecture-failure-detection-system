pattern: eks_service_account_token_expiry
failure_class: authentication_failure
conditions:
  - irsa_iam_roles_for_service_accounts
  - stale_token
  - pod_runtime_long
  - token_projection_enabled
description: Long-running pods lose AWS access because their projected Service Account Token expires and the SDK doesn't refresh it.
mitigations:
  - sdk_version_upgrade
  - pod_restart_policy
  - token_expiration_setting
  - aws_identity_webhook

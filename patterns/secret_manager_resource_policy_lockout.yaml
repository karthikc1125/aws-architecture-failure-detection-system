pattern: secret_manager_resource_policy_lockout
failure_class: security_lockout
conditions:
  - resource_based_policy
  - explicit_deny_all
  - malformed_policy
  - admin_access_revoked
description: An overly restrictive Resource Policy on a Secret prevents anyone (including admins) from retrieving or modifying it.
mitigations:
  - root_user_recovery
  - policy_simulation
  - careful_policy_testing
  - admin_break_glass_role
